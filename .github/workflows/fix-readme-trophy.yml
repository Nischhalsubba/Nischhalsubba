name: Fix profile trophy reference

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace external trophy URL with local asset
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          old = "https://github-profile-trophy-liard-delta.vercel.app/?username=Nischhalsubba&theme=darkhub&no-frame=true&no-bg=true&margin-w=8&margin-h=8&column=4"
          new = "./profile/trophy.svg"
          updated = text.replace(old, new)
          if updated != text:
              path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit README patch
        run: |
          if git diff --quiet -- README.md; then
            echo "README already uses the local trophy asset."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "fix: use local trophy SVG in profile README"
          git push
